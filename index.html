<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG 瑞士制配對系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #e8e4dc;
    --muted: #7a7880;
    --win: #2ecc71;
    --loss: #e74c3c;
    --draw: #f39c12;
  }

  * { 
    box-sizing: border-box; 
    margin: 0; padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px);
    pointer-events: none; z-index: 0;
  }

  /* ── Timer bar ─────────────────────────────────── */
  #timer-bar {
    display: none;
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    align-items: center; gap: 20px;
    padding: 10px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  #timer-bar.active { display: flex; }

  .timer-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 4px; color: var(--muted); white-space: nowrap; }
  #timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 4px; color: var(--gold-light); min-width: 110px; text-align: center; }
  .timer-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; max-width: 280px; }
  #timer-fill { height: 100%; width: 100%; background: var(--gold); border-radius: 3px; transition: width 1s linear; }

  .timer-btns { display: flex; gap: 10px; margin-left: auto; }
  .tbtn { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; padding: 7px 16px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); color: var(--muted); border-radius: 2px; }

  /* ── Layout ─────────────────────────────────────────── */
  .container { max-width: 980px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 52px; }
  .title-label { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 7px; color: var(--gold); margin-bottom: 10px; font-weight: 500; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px, 10vw, 92px); line-height: 0.85; letter-spacing: 5px; margin-bottom: 10px; }
  h1 span { color: var(--gold); }
  .subtitle { font-style: italic; color: var(--muted); font-size: 18px; margin-top: 14px; letter-spacing: 0.5px; }
  .divider { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 28px auto; opacity: 0.6; }

  .setup-panel { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--gold); padding: 36px; margin-bottom: 36px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .config-row { display: flex; gap: 24px; margin-bottom: 36px; flex-wrap: wrap; }
  .config-item { flex: 1; min-width: 150px; }
  .config-item label { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--gold); margin-bottom: 10px; letter-spacing: 2.5px; }
  .config-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 14px; outline: none; font-size: 16px; transition: border-color 0.2s; }
  .config-input:focus { border-color: var(--gold); }
  
  .setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: var(--gold); margin-bottom: 28px; border-left: 3px solid var(--gold); padding-left: 15px; }
  .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .player-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; font-size: 16px; width: 100%; outline: none; transition: all 0.2s; }
  .player-input:focus { border-color: var(--gold); background: var(--surface2); }

  /* ── 隱私權聲明優化 ── */
  .privacy-notice {
    background: rgba(201, 168, 76, 0.04);
    border: 1px solid rgba(201, 168, 76, 0.2);
    padding: 24px 30px;
    margin-bottom: 40px;
    border-radius: 4px;
    text-align: center;
  }
  .privacy-title { 
    font-family: 'Crimson Pro', serif; 
    font-weight: 600; 
    font-size: 17px; 
    color: var(--gold-light); 
    margin-bottom: 12px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 10px; 
    letter-spacing: 1px;
  }
  .privacy-content { 
    font-size: 15px;
    color: #c5c4ca; 
    line-height: 1.8; 
    max-width: 720px;
    margin: 0 auto;
    font-weight: 400;
  }

  .btn-container { text-align: center; display: flex; justify-content: center; gap: 16px; }
  .btn { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3.5px; padding: 15px 36px; border: none; cursor: pointer; transition: all 0.3s; border-radius: 2px; }
  .btn-primary { background: var(--gold); color: var(--bg); font-weight: 600; }
  .btn-primary:hover { background: var(--gold-light); box-shadow: 0 4px 15px rgba(201,168,76,0.3); }
  .btn-secondary { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-secondary:hover { background: rgba(201,168,76,0.1); }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; margin-top: 25px; }
  th { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--gold); padding: 14px; border-bottom: 2px solid var(--gold); font-weight: normal; }
  td { padding: 14px; text-align: center; border-bottom: 1px solid var(--border); font-size: 17px; }
  .rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); }
  .rank-1 .rank-num { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
  .rank-2 .rank-num { color: #c0c0c0; }
  .rank-3 .rank-num { color: #cd7f32; }
  .score-cell { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold-light); }
  .wl .w { color: var(--win); font-weight: 600; }
  .wl .l { color: var(--loss); font-weight: 600; }
  .pct { font-size: 15px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ── Footer 視覺強化 ── */
  footer { 
    margin-top: 100px; 
    padding: 60px 0; 
    text-align: center; 
    border-top: 1px solid var(--border); 
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3));
  }
  .credit-text { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 16px; 
    letter-spacing: 4px; 
    color: var(--text); 
    margin-bottom: 12px;
  }
  .credit-text a { 
    color: var(--gold); 
    text-decoration: none; 
    border-bottom: 1px solid rgba(201,168,76,0.3); 
    transition: all 0.2s; 
    font-weight: 500;
  }
  .credit-text a:hover { 
    color: var(--gold-light); 
    border-bottom-color: var(--gold-light); 
  }
  .powered-text { 
    font-family: 'Crimson Pro', serif;
    font-size: 14px; 
    font-style: italic; 
    color: var(--muted); 
    opacity: 0.9; 
    letter-spacing: 1px;
    font-weight: 400;
  }
  .powered-text strong {
    color: var(--gold-light);
    font-weight: 600;
    font-style: normal;
  }

  .tournament { display: none; }
  .round-section { margin-bottom: 50px; }
  .match-card { background: var(--surface); border: 1px solid var(--border); display: flex; min-height: 56px; margin-bottom: 8px; transition: transform 0.2s; }
  .match-card:hover { border-color: #444; }
  .match-table { width: 48px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 19px; }
  .match-player { flex: 1; padding: 16px 20px; font-weight: 600; font-size: 19px; display: flex; align-items: center; }
  .match-player-1 { justify-content: flex-end; }
  .match-vs { width: 68px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 19px; }
  .result-area { width: 250px; display: flex; gap: 10px; padding: 12px 18px; border-left: 1px solid var(--border); }
  .rbtn { flex: 1; cursor: pointer; background: #2d3748; color: #a0aec0; border: 1px solid #4a5568; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; transition: all 0.2s; }
  .active-win { background: var(--win) !important; color: #000 !important; border-color: var(--win) !important; }

  .champion-banner { background: linear-gradient(135deg, #1a160a, #262112); border: 2px solid var(--gold); padding: 50px; text-align: center; margin-bottom: 40px; box-shadow: 0 0 30px rgba(201,168,76,0.15); }
  .champion-label { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--gold); letter-spacing: 8px; margin-bottom: 12px; }
  .champion-name { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: var(--gold-light); letter-spacing: 4px; }
  .champion-score { font-size: 20px; font-style: italic; color: var(--muted); margin-top: 10px; }
  
  .dropped-row { background: #1a0a0a !important; color: #666; opacity: 0.7; }
</style>
</head>
<body>

<div id="timer-bar">
  <div class="timer-label">對局時間</div>
  <div id="timer-display">25:00</div>
  <div class="timer-track"><div id="timer-fill"></div></div>
  <div class="timer-btns">
    <button class="tbtn" id="tbtn-toggle" onclick="timerToggle()">開始</button>
    <button class="tbtn" onclick="timerReset()">重置</button>
  </div>
</div>

<div class="container">
  <header>
    <div class="title-label">Play！ Pokémon Official Rules</div>
    <h1>瑞士制<br><span>配對系統</span></h1>
    <p class="subtitle">彈性配置 · PTCG 官方規則</p>
    <div class="divider"></div>
  </header>

  <div id="setup-panel" class="setup-panel">
    <div class="config-row">
      <div class="config-item">
        <label>參賽人數</label>
        <input type="number" id="cfg-players" class="config-input" value="16" onchange="updateGrid()">
      </div>
      <div class="config-item">
        <label>比賽輪次</label>
        <input type="number" id="cfg-rounds" class="config-input" value="4">
      </div>
      <div class="config-item">
        <label>雙敗淘汰</label>
        <select id="cfg-drop" class="config-input">
          <option value="none" selected>關閉（瑞士制）</option>
          <option value="double">開啟（二敗淘汰）</option>
        </select>
      </div>
    </div>
    
    <div class="setup-title">▸ 輸入參賽者名單</div>
    <div class="players-grid" id="players-grid"></div>

    <div class="privacy-notice">
      <div class="privacy-title">🔒 隱私權與數據處理聲明</div>
      <div class="privacy-content">
        本系統為純前端應用工具，所有輸入的選手名單及對戰紀錄均僅儲存在您的瀏覽器暫存中，不會上傳至任何伺服器。當您重新整理網頁或關閉分頁時，數據將會清除，請放心使用。
      </div>
    </div>

    <div class="btn-container">
      <button class="btn btn-primary" onclick="startTournament()">開始比賽</button>
      <button class="btn btn-secondary" onclick="fillSample()">填入選手編號</button>
    </div>
  </div>

  <div id="tournament" class="tournament">
    <div id="rounds-container"></div>
    <div id="standings-container"></div>
  </div>

  <footer>
    <div class="credit-text">
      Created by <a href="https://www.instagram.com/yu__03.07/" target="_blank">小宇（＠yu__03.07）</a>
    </div>
    <div class="powered-text">
      Powered By <strong>Claude Sonnet 4.6</strong>、<strong>Gemini 3 Flash</strong>（Vibe Coding）
    </div>
  </footer>
</div>

<script>
let players = [], rounds = [], currentRound = 0;
let totalRounds = 4, dropMode = 'none';
const ROUND_SECONDS = 25 * 60;

let timerSecsLeft = ROUND_SECONDS, timerRunning = false, timerInterval = null;

function timerTick() {
  if (!timerRunning) return;
  timerSecsLeft--; updateTimerUI();
  if (timerSecsLeft <= 0) {
    timerRunning = false; clearInterval(timerInterval);
    document.getElementById('tbtn-toggle').textContent = '開始';
  }
}
function timerToggle() {
  if (timerSecsLeft <= 0) return;
  timerRunning = !timerRunning;
  const btn = document.getElementById('tbtn-toggle');
  if (timerRunning) {
    btn.textContent = '暫停'; timerInterval = setInterval(timerTick, 1000);
  } else {
    btn.textContent = '繼續'; clearInterval(timerInterval);
  }
}
function timerReset() {
  timerRunning = false; clearInterval(timerInterval);
  timerSecsLeft = ROUND_SECONDS; updateTimerUI();
  document.getElementById('tbtn-toggle').textContent = '開始';
}
function updateTimerUI() {
  const m = Math.floor(timerSecsLeft/60), s = timerSecsLeft%60;
  const disp = document.getElementById('timer-display'), fill = document.getElementById('timer-fill');
  disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  fill.style.width = (timerSecsLeft/ROUND_SECONDS*100)+'%';
}

function updateGrid() {
  const n = parseInt(document.getElementById('cfg-players').value) || 0;
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';
  for(let i=0; i<n; i++) {
    const inp = document.createElement('input');
    inp.className = 'player-input'; inp.placeholder = `選手 ${i+1}`; inp.id = `pi-${i}`;
    grid.appendChild(inp);
  }
  document.getElementById('cfg-rounds').value = Math.ceil(Math.log2(n));
}
updateGrid();

function fillSample() {
  const n = parseInt(document.getElementById('cfg-players').value);
  for(let i=0; i<n; i++) document.getElementById(`pi-${i}`).value = `選手 ${i+1}`;
}

function getStats(pid) {
  let pts = 0, wins = 0, losses = 0, nonByeMatches = 0, hasBye = false;
  rounds.forEach(r => r.forEach(m => {
    if(m.bye === pid) { pts += 3; wins++; hasBye = true; }
    else if(m.p1 === pid || m.p2 === pid) {
      if(!m.result) return;
      nonByeMatches++;
      const win = (m.p1 === pid && m.result === '1') || (m.p2 === pid && m.result === '2');
      win ? (pts += 3, wins++) : losses++;
    }
  }));
  if(dropMode === 'double' && losses >= 2) players[pid].dropped = true;
  return { pts, wins, losses, nonByeMatches, hasBye };
}

function winPct(pid) {
  const s = getStats(pid);
  if(s.nonByeMatches === 0) return 0.25;
  const raw = (s.wins - (s.hasBye ? 1 : 0)) / s.nonByeMatches;
  return Math.min(0.75, Math.max(0.25, raw));
}

function getOpWinPct(pid) {
  let opps = [];
  rounds.forEach(r => r.forEach(m => {
    if(m.p1 === pid) opps.push(m.p2); else if(m.p2 === pid) opps.push(m.p1);
  }));
  if(!opps.length) return 0.25;
  return opps.reduce((sum, oid) => sum + winPct(oid), 0) / opps.length;
}

function getOpOpWinPct(pid) {
  let opps = [];
  rounds.forEach(r => r.forEach(m => {
    if(m.p1 === pid) opps.push(m.p2); else if(m.p2 === pid) opps.push(m.p1);
  }));
  if(!opps.length) return 0.25;
  return opps.reduce((sum, oid) => sum + getOpWinPct(oid), 0) / opps.length;
}

function getSortedIds() {
  return players.map(p => p.id).sort((a,b) => {
    if(players[a].dropped !== players[b].dropped) return players[a].dropped ? 1 : -1;
    const sa = getStats(a), sb = getStats(b);
    if(sb.pts !== sa.pts) return sb.pts - sa.pts;
    const oa = getOpWinPct(a), ob = getOpWinPct(b);
    if(Math.abs(ob - oa) > 1e-9) return ob - oa;
    return getOpOpWinPct(b) - getOpOpWinPct(a);
  });
}

function makePairings() {
  const sorted = getSortedIds().filter(id => !players[id].dropped);
  const paired = new Set(), matches = [];
  if(sorted.length % 2 !== 0) {
    for(let i = sorted.length - 1; i >= 0; i--) {
      const pid = sorted[i];
      if(!rounds.some(r => r.some(m => m.bye === pid))) {
        matches.push({ bye: pid }); paired.add(pid); break;
      }
    }
  }
  let pool = sorted.filter(id => !paired.has(id));
  while(pool.length > 0) {
    const p1 = pool.shift();
    let p2 = null;
    for(let j=0; j < pool.length; j++) {
      if(!players[p1].history.has(pool[j])) {
        p2 = pool.splice(j, 1)[0]; break;
      }
    }
    if(p2 === null && pool.length > 0) p2 = pool.shift();
    if(p2 !== null) {
      matches.push({ p1, p2, result: null });
      players[p1].history.add(p2); players[p2].history.add(p1);
    } else { matches.push({ bye: p1 }); }
  }
  return matches;
}

function startTournament() {
  const n = parseInt(document.getElementById('cfg-players').value);
  totalRounds = parseInt(document.getElementById('cfg-rounds').value);
  dropMode = document.getElementById('cfg-drop').value;
  players = Array.from({length: n}, (_, i) => ({
    id: i, name: document.getElementById(`pi-${i}`).value.trim() || `選手 ${i+1}`,
    dropped: false, history: new Set()
  }));
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('tournament').style.display = 'block';
  document.getElementById('timer-bar').classList.add('active');
  doNextRound();
}

function doNextRound() {
  if(currentRound >= totalRounds) return;
  rounds.push(makePairings());
  renderRound(currentRound++);
  renderStandings();
  timerReset();
}

function renderRound(ri) {
  const container = document.getElementById('rounds-container');
  const sec = document.createElement('div'); sec.className = 'round-section';
  let t = 1;
  const html = rounds[ri].map((m, mi) => {
    if(m.bye !== undefined) return `<div class="match-card bye"><div class="match-table">BYE</div><div class="match-player">🎯 ${players[m.bye].name}（輪空）</div></div>`;
    return `<div class="match-card">
      <div class="match-table">${t++}</div>
      <div class="match-player match-player-1">${players[m.p1].name}</div>
      <div class="match-vs">VS</div>
      <div class="match-player">${players[m.p2].name}</div>
      <div class="result-area">
        <button class="rbtn" id="rb1-${ri}-${mi}" onclick="setResult(${ri},${mi},'1')">◀ 勝</button>
        <button class="rbtn" id="rb2-${ri}-${mi}" onclick="setResult(${ri},${mi},'2')">勝 ▶</button>
      </div>
    </div>`;
  }).join('');
  const isLast = ri === totalRounds - 1;
  sec.innerHTML = `<div class="round-header"><div class="round-badge">第 ${ri+1} 輪</div><div class="round-line"></div></div><div class="matches-list">${html}</div><div class="round-controls" style="margin-top:20px; text-align:right;"><button class="btn btn-primary btn-small" id="btn-${ri}" style="display:none" onclick="${isLast ? 'showFinal()' : 'doNextRound()'}">${isLast ? '查看總排名' : '下一輪 →'}</button></div>`;
  container.appendChild(sec);

  // 利用 setTimeout 給瀏覽器緩衝時間重新計算座標，並採用精確置中 (block: 'center')
  setTimeout(() => {
    sec.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function setResult(ri, mi, win) {
  rounds[ri][mi].result = win;
  document.getElementById(`rb1-${ri}-${mi}`).classList.toggle('active-win', win === '1');
  document.getElementById(`rb2-${ri}-${mi}`).classList.toggle('active-win', win === '2');
  renderStandings();
  if(rounds[ri].every(m => m.bye !== undefined || m.result)) document.getElementById(`btn-${ri}`).style.display = 'inline-block';
}

function renderStandings() {
  const container = document.getElementById('standings-container');
  container.innerHTML = '';
  const ids = getSortedIds();
  const rows = ids.map((pid, idx) => {
    const s = getStats(pid), ow = getOpWinPct(pid), oow = getOpOpWinPct(pid), p = players[pid];
    const rankLabel = ['🥇','🥈','🥉'][idx] || idx + 1;
    const rankClass = ['rank-1','rank-2','rank-3'][idx] || '';

    return `<tr class="${rankClass} ${p.dropped ? 'dropped-row' : ''}">
      <td class="rank-num">${rankLabel}</td>
      <td class="player-name-cell">${p.name} ${p.dropped ? '（OUT）' : ''}</td>
      <td class="score-cell">${s.pts}</td>
      <td class="wl"><span class="w">${s.wins}勝</span> <span class="l">${s.losses}負</span></td>
      <td class="pct">${(ow*100).toFixed(1)}%</td>
      <td class="pct">${(oow*100).toFixed(1)}%</td>
    </tr>`;
  }).join('');
  container.innerHTML = `<div class="setup-title" style="margin-top:40px;">即時排名</div><table><thead><tr><th>名次</th><th>選手</th><th>積分</th><th>勝/負</th><th>Op Win%</th><th>Op-Op Win%</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function showFinal() {
  const winner = getSortedIds()[0];
  const s = getStats(winner);
  document.getElementById('rounds-container').innerHTML = `<div class="champion-banner"><div class="champion-label">🏆 TOURNAMENT CHAMPION</div><div class="champion-name">${players[winner].name}</div><div class="champion-score">${s.pts} 積分 · ${s.wins}勝 ${s.losses}負</div><button class="btn btn-secondary" onclick="location.reload()" style="margin-top:20px">重新開始</button></div>`;
  renderStandings();
}
</script>
</body>
</html>
